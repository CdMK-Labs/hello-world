<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="Content-Style-Type" content="text/css">
  <title></title>
  <meta name="Generator" content="Cocoa HTML Writer">
  <meta name="CocoaVersion" content="2575.7">
  <style type="text/css">
    p.p2 {margin: 0.0px 0.0px 12.0px 0.0px; font: 12.0px Arial; color: #00008B; -webkit-text-stroke: #00008B}
    p.p3 {margin: 0.0px 0.0px 12.0px 0.0px; font: 12.0px Arial; -webkit-text-stroke: #00008B}
    p.p4 {margin: 0.0px 0.0px 12.0px 0.0px; font: 13.0px Menlo; -webkit-text-stroke: #00008B}
    span.s1 {font-kerning: none}
    span.s2 {font: 12.0px Arial; font-kerning: none}
    span.s3 {font-kerning: none; background-color: #f1f1f1}
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .wave-char {
      display: inline-block;
      animation: wave 1.2s ease-in-out infinite;
    }
    .star {
      position: fixed;
      pointer-events: none;
      animation: sparkle var(--duration) ease-in-out infinite;
      animation-delay: var(--delay);
      opacity: 0;
    }
    @keyframes sparkle {
      0%   { opacity: 0; transform: scale(0.5) rotate(0deg); }
      20%  { opacity: 1; transform: scale(1.2) rotate(72deg); }
      40%  { opacity: 0.6; transform: scale(0.9) rotate(144deg); }
      60%  { opacity: 1; transform: scale(1.3) rotate(216deg); }
      80%  { opacity: 0.4; transform: scale(0.8) rotate(288deg); }
      100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
    }
  </style>
</head>
<body style="background-color: #ADD8E6; color: #00008B;">
<h1 style="margin: 0.0px 0.0px 3.0px 0.0px; font: 24.0px Arial; -webkit-text-stroke: #00008B"><span class="s1"><b>Hello world</b></span></h1>
<p class="p2"><span class="s1">First deployment from <b>CdMK Labs</b>.</span></p>
<p class="p3"><span class="s1">If you can see this page, GitHub Pages deployment is working.</span></p>
<p class="p4"><span class="s2">Repo: </span><span class="s3">hello-world</span></p>
<p class="p4"><span class="s3">Manual change</span></p>
<script>
  function wrapChars(node, index) {
    if (node.nodeType === Node.TEXT_NODE) {
      var chars = node.textContent.split('');
      var frag = document.createDocumentFragment();
      chars.forEach(function(ch) {
        if (ch === ' ') {
          frag.appendChild(document.createTextNode(' '));
        } else {
          var span = document.createElement('span');
          span.className = 'wave-char';
          span.style.animationDelay = (index * 0.07) + 's';
          span.textContent = ch;
          frag.appendChild(span);
          index++;
        }
      });
      node.parentNode.replaceChild(frag, node);
    } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE') {
      Array.from(node.childNodes).forEach(function(child) {
        index = wrapChars(child, index);
      });
    }
    return index;
  }
  wrapChars(document.body, 0);

  (function() {
    var starCount = 60;
    var colors = ['#FFD700', '#FFFACD', '#FFFFFF', '#FFF8DC', '#87CEEB'];
    for (var i = 0; i < starCount; i++) {
      var star = document.createElement('div');
      star.className = 'star';
      var size = (Math.random() * 18 + 8) + 'px';
      var color = colors[Math.floor(Math.random() * colors.length)];
      star.style.setProperty('--duration', (Math.random() * 2.5 + 1.5) + 's');
      star.style.setProperty('--delay', (Math.random() * 4) + 's');
      star.style.left = (Math.random() * 100) + 'vw';
      star.style.top = (Math.random() * 100) + 'vh';
      star.style.fontSize = size;
      star.style.color = color;
      star.style.textShadow = '0 0 6px ' + color + ', 0 0 12px ' + color;
      star.textContent = '★';
      document.body.appendChild(star);
    }
  })();
</script>
</body>
</html>
