<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="Content-Style-Type" content="text/css">
  <title></title>
  <meta name="Generator" content="Cocoa HTML Writer">
  <meta name="CocoaVersion" content="2575.7">
  <style type="text/css">
    p.p2 {margin: 0.0px 0.0px 12.0px 0.0px; font: 12.0px Arial; color: #FFFFFF; -webkit-text-stroke: #FFFFFF}
    p.p3 {margin: 0.0px 0.0px 12.0px 0.0px; font: 12.0px Arial; -webkit-text-stroke: #FFFFFF}
    p.p4 {margin: 0.0px 0.0px 12.0px 0.0px; font: 13.0px Menlo; -webkit-text-stroke: #FFFFFF}
    span.s1 {font-kerning: none}
    span.s2 {font: 12.0px Arial; font-kerning: none}
    span.s3 {font-kerning: none; background-color: #f1f1f1}
    @keyframes sparkleText {
      0%   { color: #FFFFFF; text-shadow: 0 0 2px #FFFFFF; }
      25%  { color: #CCCCCC; text-shadow: 0 0 8px #CCCCCC, 0 0 18px #CCCCCC; }
      50%  { color: #FFFFFF; text-shadow: 0 0 12px #FFFFFF, 0 0 26px #FFFFFF; }
      75%  { color: #DDDDDD; text-shadow: 0 0 8px #DDDDDD, 0 0 18px #DDDDDD; }
      100% { color: #FFFFFF; text-shadow: 0 0 2px #FFFFFF; }
    }
    .sparkle-char {
      display: inline-block;
      animation: sparkleText 2s ease-in-out infinite;
    }
    .star {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transition: left 2s ease-in-out, top 2s ease-in-out, opacity 0.8s ease-in-out;
    }
    .star.visible {
      opacity: 1;
      animation: pulse 1.5s ease-in-out infinite;
      animation-delay: var(--pulse-delay, 0s);
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.4); opacity: 1; }
    }
  </style>
</head>
<body style="background-color: #006400; color: #FFFFFF;">
<h1 style="margin: 0.0px 0.0px 3.0px 0.0px; font: 24.0px Arial; -webkit-text-stroke: #FFFFFF"><span class="s1"><b>Hello world</b></span></h1>
<p class="p2"><span class="s1">First deployment from <b>CdMK Labs</b>.</span></p>
<p class="p3"><span class="s1">If you can see this page, GitHub Pages deployment is working.</span></p>
<p class="p4"><span class="s2">Repo: </span><span class="s3">hello-world</span></p>
<p class="p4"><span class="s3">Manual change</span></p>
<script>
  function wrapChars(node, index) {
    if (node.nodeType === Node.TEXT_NODE) {
      var chars = node.textContent.split('');
      var frag = document.createDocumentFragment();
      chars.forEach(function(ch) {
        if (ch === ' ') {
          frag.appendChild(document.createTextNode(' '));
        } else {
          var span = document.createElement('span');
          span.className = 'sparkle-char';
          span.style.animationDelay = (index * 0.1) + 's';
          span.textContent = ch;
          frag.appendChild(span);
          index++;
        }
      });
      node.parentNode.replaceChild(frag, node);
    } else if (node.nodeType === Node.ELEMENT_NODE && node.tagName !== 'SCRIPT' && node.tagName !== 'STYLE') {
      Array.from(node.childNodes).forEach(function(child) {
        index = wrapChars(child, index);
      });
    }
    return index;
  }
  wrapChars(document.body, 0);

  (function() {
    var starCount = 60;
    var colors = ['#FFD700', '#FFFACD', '#FFFFFF', '#FFF8DC', '#87CEEB'];
    var stars = [];

    for (var i = 0; i < starCount; i++) {
      var star = document.createElement('div');
      star.className = 'star';
      var size = (Math.random() * 18 + 8) + 'px';
      var color = colors[Math.floor(Math.random() * colors.length)];
      star.style.left = (Math.random() * 100) + 'vw';
      star.style.top = (Math.random() * 100) + 'vh';
      star.style.fontSize = size;
      star.style.color = color;
      star.style.textShadow = '0 0 6px ' + color + ', 0 0 12px ' + color;
      star.textContent = '\u2605';
      star.style.setProperty('--pulse-delay', (i * 0.05) + 's');
      document.body.appendChild(star);
      stars.push(star);
    }

    var cx = window.innerWidth / 2;
    var cy = window.innerHeight / 2;
    var radius = Math.min(cx, cy) * 0.6;

    function polygon(n, count) {
      var pts = [];
      for (var i = 0; i < count; i++) {
        var side = i % n;
        var t = (i % Math.ceil(count / n)) / Math.ceil(count / n);
        var a1 = (side / n) * Math.PI * 2 - Math.PI / 2;
        var a2 = ((side + 1) / n) * Math.PI * 2 - Math.PI / 2;
        pts.push({
          x: cx + radius * (Math.cos(a1) * (1 - t) + Math.cos(a2) * t),
          y: cy + radius * (Math.sin(a1) * (1 - t) + Math.sin(a2) * t)
        });
      }
      return pts;
    }

    function circle(count) {
      var pts = [];
      for (var i = 0; i < count; i++) {
        var a = (i / count) * Math.PI * 2 - Math.PI / 2;
        pts.push({ x: cx + radius * Math.cos(a), y: cy + radius * Math.sin(a) });
      }
      return pts;
    }

    function spiral(count) {
      var pts = [];
      for (var i = 0; i < count; i++) {
        var t = i / count;
        var a = t * Math.PI * 6;
        var r = radius * t;
        pts.push({ x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) });
      }
      return pts;
    }

    function grid(count) {
      var side = Math.ceil(Math.sqrt(count));
      var spacing = (radius * 2) / (side - 1 || 1);
      var pts = [];
      for (var i = 0; i < count; i++) {
        var row = Math.floor(i / side);
        var col = i % side;
        pts.push({ x: cx - radius + col * spacing, y: cy - radius + row * spacing });
      }
      return pts;
    }

    function scatter(count) {
      var pts = [];
      for (var i = 0; i < count; i++) {
        pts.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight });
      }
      return pts;
    }

    var shapes = [
      function() { return circle(starCount); },
      function() { return polygon(3, starCount); },
      function() { return polygon(4, starCount); },
      function() { return polygon(5, starCount); },
      function() { return polygon(6, starCount); },
      function() { return spiral(starCount); },
      function() { return grid(starCount); },
      function() { return scatter(starCount); }
    ];

    var shapeIndex = 0;

    function moveToShape() {
      var pts = shapes[shapeIndex]();
      for (var i = 0; i < stars.length; i++) {
        stars[i].style.left = pts[i].x + 'px';
        stars[i].style.top = pts[i].y + 'px';
      }
      setTimeout(function() {
        for (var i = 0; i < stars.length; i++) {
          stars[i].classList.add('visible');
        }
      }, 100);
      shapeIndex = (shapeIndex + 1) % shapes.length;
    }

    setTimeout(function() { moveToShape(); }, 500);
    setInterval(moveToShape, 3500);

    window.addEventListener('resize', function() {
      cx = window.innerWidth / 2;
      cy = window.innerHeight / 2;
      radius = Math.min(cx, cy) * 0.6;
    });
  })();
</script>
</body>
</html>
